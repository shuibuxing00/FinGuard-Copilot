<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="42" fill="#e6edf3" font-size="22" font-weight="700" text-anchor="middle">FinGuard Compliance Copilot  Architecture</text>
  <text x="600" y="66" fill="#8b949e" font-size="13" text-anchor="middle">Splunk Agentic Ops · Security Track · Data Flow</text>

  <!-- Users -->
  <rect x="40" y="100" width="160" height="56" rx="8" fill="#1f6feb" filter="url(#shadow)"/>
  <text x="120" y="133" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Compliance Users</text>

  <!-- Streamlit -->
  <rect x="280" y="88" width="200" height="80" rx="8" fill="#238636" filter="url(#shadow)"/>
  <text x="380" y="118" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Streamlit UI</text>
  <text x="380" y="140" fill="#aff1b1" font-size="11" text-anchor="middle">Auth · Dashboard · Export</text>

  <!-- React -->
  <rect x="280" y="190" width="200" height="56" rx="8" fill="#8957e5" filter="url(#shadow)"/>
  <text x="380" y="223" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">React Dashboard (optional)</text>

  <!-- Security -->
  <rect x="540" y="88" width="220" height="158" rx="8" fill="#da3633" filter="url(#shadow)"/>
  <text x="650" y="115" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Security Layer</text>
  <text x="650" y="138" fill="#ffc1bc" font-size="11" text-anchor="middle">Identity Auth · RBAC</text>
  <text x="650" y="156" fill="#ffc1bc" font-size="11" text-anchor="middle">PBKDF2 Pseudonymization</text>
  <text x="650" y="174" fill="#ffc1bc" font-size="11" text-anchor="middle">LLM Guard · Audit Hash Chain</text>
  <text x="650" y="228" fill="#ffc1bc" font-size="10" text-anchor="middle">Every query logged &amp; filtered</text>

  <!-- Agent -->
  <rect x="820" y="88" width="200" height="80" rx="8" fill="#9e6a03" filter="url(#shadow)"/>
  <text x="920" y="118" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">LangChain ReAct Agent</text>
  <text x="920" y="140" fill="#f8e3a1" font-size="11" text-anchor="middle">4 investigation tools</text>

  <!-- OpenAI -->
  <rect x="1060" y="100" width="120" height="56" rx="8" fill="#1f6feb" filter="url(#shadow)"/>
  <text x="1120" y="133" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">OpenAI API</text>

  <!-- Splunk Tools -->
  <rect x="540" y="290" width="220" height="90" rx="8" fill="#0d419d" filter="url(#shadow)"/>
  <text x="650" y="320" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">SplunkTools Interface</text>
  <text x="650" y="342" fill="#9ecbff" font-size="11" text-anchor="middle">splunk_tools.py</text>
  <text x="650" y="362" fill="#9ecbff" font-size="10" text-anchor="middle">SDK-ready · mock indexes in demo</text>

  <!-- Mock Splunk -->
  <rect x="280" y="400" width="200" height="70" rx="8" fill="#30363d" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="430" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle">Mock Splunk Indexes</text>
  <text x="380" y="452" fill="#8b949e" font-size="11" text-anchor="middle">users · transactions · devices</text>

  <!-- RAG -->
  <rect x="820" y="290" width="200" height="90" rx="8" fill="#6e40c9" filter="url(#shadow)"/>
  <text x="920" y="320" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Compliance RAG</text>
  <text x="920" y="342" fill="#d2bfff" font-size="11" text-anchor="middle">Chroma or keyword fallback</text>
  <text x="920" y="362" fill="#d2bfff" font-size="10" text-anchor="middle">data/compliance_laws/*.txt</text>

  <!-- Data gen -->
  <rect x="540" y="420" width="220" height="56" rx="8" fill="#30363d" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="452" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">data/generate.py · Synthetic datasets</text>

  <!-- Arrows -->
  <line x1="200" y1="128" x2="278" y2="128" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="128" x2="538" y2="128" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="128" x2="818" y2="128" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1020" y1="128" x2="1058" y2="128" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="168" x2="920" y2="288" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="246" x2="650" y2="288" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="335" x2="482" y2="400" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="335" x2="380" y2="400" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <line x1="650" y1="380" x2="650" y2="418" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="168" x2="380" y2="188" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="218" x2="278" y2="218" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="600" y="530" fill="#8b949e" font-size="12" text-anchor="middle">Solid lines = runtime data flow · Blue = Splunk-shaped queries · Green = synthetic data generation</text>
  <text x="600" y="552" fill="#6e7681" font-size="11" text-anchor="middle">See ARCHITECTURE.md for sequence diagrams and production Splunk SDK mapping</text>

  <!-- Legend -->
  <rect x="40" y="580" width="1120" height="110" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="608" fill="#e6edf3" font-size="13" font-weight="600">Legend</text>
  <circle cx="70" cy="632" r="6" fill="#0d419d"/><text x="86" y="636" fill="#8b949e" font-size="11">Splunk integration (mock locally, SDK in production)</text>
  <circle cx="70" cy="656" r="6" fill="#9e6a03"/><text x="86" y="660" fill="#8b949e" font-size="11">AI agent + OpenAI (Investigation tab)</text>
  <circle cx="400" cy="632" r="6" fill="#da3633"/><text x="416" y="636" fill="#8b949e" font-size="11">Security enforced on every tool call</text>
  <circle cx="400" cy="656" r="6" fill="#6e40c9"/><text x="416" y="660" fill="#8b949e" font-size="11">Regulation RAG corpus included in repo</text>
  <circle cx="750" cy="632" r="6" fill="#238636"/><text x="766" y="636" fill="#8b949e" font-size="11">Streamlit = primary app entry (streamlit run app/streamlit_app.py)</text>
  <circle cx="750" cy="656" r="6" fill="#8957e5"/><text x="766" y="660" fill="#8b949e" font-size="11">React = optional dashboard (frontend/)</text>
</svg>
